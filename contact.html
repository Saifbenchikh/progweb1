<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projet Web - Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Contactez-nous</h1>
    </header>
    <nav>
        <ul>
            <li><a href="index.html">Accueil</a></li>
            <li><a href="quiz.html">Quiz</a></li>
            <li><a href="devinette.html">Devinette</a></li>
        </ul>
    </nav>
    <main>
        <section class="card">
            <h2>Formulaire de contact</h2>
            
            <form action="contact.php" method="GET">
                <fieldset>
                    <legend>Vos informations</legend>
                    <label for="pseudo">Pseudo :</label>
                    <input type="text" id="pseudo" name="pseudo" required>
                    <br><br>
                    <label for="email">Email :</label>
                    <input type="email" id="email" name="email" required>
                </fieldset>

                <fieldset>
                    <legend>Votre demande</legend>
                    <label for="categorie">Catégorie d'information :</label>
                    <select id="categorie" name="categorie" required>
                        <option value="">Choisissez une catégorie...</option>
                        <option value="quiz">À propos du Quiz</option>
                        <option value="devinette">À propos de la Devinette</option>
                        <option value="autre">Autre demande</option>
                    </select>
                </fieldset>

                <fieldset>
                    <legend>Newsletter</legend>
                    <p>Souhaitez-vous recevoir notre newsletter ?</p>
                    <label><input type="radio" name="newsletter" value="oui" required> Oui</label>
                    <label><input type="radio" name="newsletter" value="non"> Non</label>
                    <br><br>
                    <label for="frequence">Fréquence de réception (si oui) :</label>
                    <select id="frequence" name="frequence">
                        <option value="">Sélectionnez...</option>
                        <option value="quotidienne">Quotidienne</option>
                        <option value="hebdomadaire">Hebdomadaire</option>
                        <option value="mensuelle">Mensuelle</option>
                    </select>
                </fieldset>

                <button type="submit" class="btn">Envoyer la demande</button>
            </form>
            
        </section>
    </main>
    <footer>
        <p>&copy; 2026 - Projet Web Étudiant</p>
        <p><a href="contact.html">Nous contacter</a></p>
    </footer>
</body>
</html>
